<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Learn German with Us</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>

<body>

  <div class="deco-orb orb1"></div>
  <div class="deco-orb orb2"></div>
  <div class="toast" id="toast">✨ Added!</div>

  <!-- ════════════ PAGE 1 ════════════ -->
  <div class="page active" id="page1">

    <div class="header">
      <div class="header-badge"><span>🇩🇪</span> Deutsch Lernen</div>
      <h1>German Tutor</h1>
      <p>Type in English · Learn in German</p>
    </div>

    <div class="add-section">
      <label>✦ Add a new phrase</label>
      <div class="input-wrap">
        <textarea id="phraseInput" placeholder="e.g. Good morning, how are you?" maxlength="200"></textarea>
        <span class="char-count" id="charCount">0/200</span>
      </div>

      <div class="photo-preview-wrap" id="photoPreviewWrap">
        <img id="photoPreviewImg" src="" alt="phrase visual" />
        <div class="photo-preview-overlay">
          <span class="photo-preview-label">&#128248; Visual aid</span>
          <button class="btn-remove-photo" onclick="removePhoto()" title="Remove">
            <svg viewBox="0 0 24 24" stroke-linecap="round">
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
      </div>

      <div class="photo-upload-zone">
        <label class="photo-upload-label" for="photoInput">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="4" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg>
          Add a visual (optional)
        </label>
        <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoUpload(event)">
      </div>

      <button class="btn-add" onclick="addPhrase()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="16" />
          <line x1="8" y1="12" x2="16" y2="12" />
        </svg>
        Save Phrase
      </button>
    </div>

    <div class="list-section">
      <div class="list-header">
        <h2>✦ My Phrases</h2>
        <span class="list-count" id="listCount">0</span>
      </div>
      <div class="phrase-list" id="phraseList">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">💬</div>
          <p>Add your first phrase to start learning German!</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ════════════ PAGE 2 ════════════ -->
  <div class="page" id="page2" style="align-items:center;">

    <div class="result-header">
      <button class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7" />
        </svg>
      </button>
      <!-- Floating photo on result page -->
      <div class="result-photo-frame" id="resultPhotoFrame">
        <img id="resultPhotoImg" src="" alt="visual aid" />
      </div>
      <div class="result-title-small">✦ Interactive Lesson</div>
      <div class="result-title">Learn German with Us</div>
    </div>

    <!-- English text above character -->
    <div style="width:100%;max-width:440px;padding:0 20px;margin-bottom:12px;">
      <div class="lang-card english-card" id="englishCard">
        <div class="lang-tag">🇬🇧 English</div>
        <div class="lang-text" id="englishText">—</div>
        <div class="speaking-indicator" id="speakIndicatorEn">
          <div class="speak-dot"></div>
          <div class="speak-dot"></div>
          <div class="speak-dot"></div>
          <span>Speaking English…</span>
        </div>
      </div>
    </div>

    <!-- Character -->
    <div class="character-wrap">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="avatar-circle" id="avatarCircle">
        <!-- 3D-style tutor SVG -->
        <svg class="tutor-svg" viewBox="0 0 140 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Glow behind head -->
          <ellipse cx="70" cy="68" rx="38" ry="38" fill="url(#headGlow)" opacity="0.35" />
          <!-- Body / shirt -->
          <path d="M30 155 Q30 118 45 112 L55 108 Q62 160 70 160 Q78 160 85 108 L95 112 Q110 118 110 155Z"
            fill="url(#shirtGrad)" />
          <!-- Collar / tie area -->
          <path d="M55 108 Q62 115 70 115 Q78 115 85 108 L80 125 L70 130 L60 125Z" fill="url(#tieGrad)" />
          <!-- Neck -->
          <rect x="62" y="100" width="16" height="14" rx="7" fill="url(#skinGrad)" />
          <!-- Head -->
          <ellipse cx="70" cy="72" rx="34" ry="36" fill="url(#skinGrad)" />
          <!-- Hair -->
          <path d="M36 64 Q36 30 70 30 Q104 30 104 64 Q104 48 96 42 Q82 32 70 33 Q54 33 44 44 Q38 52 36 64Z"
            fill="url(#hairGrad)" />
          <!-- Hair sides -->
          <path d="M36 64 Q34 56 37 50 Q40 44 42 50 Q40 56 40 64Z" fill="#5c3317" />
          <path d="M104 64 Q106 56 103 50 Q100 44 98 50 Q100 56 100 64Z" fill="#5c3317" />
          <!-- Ears -->
          <ellipse cx="36" cy="74" rx="5" ry="7" fill="url(#skinGrad)" />
          <ellipse cx="104" cy="74" rx="5" ry="7" fill="url(#skinGrad)" />
          <!-- Eyes whites -->
          <ellipse cx="57" cy="68" rx="10" ry="11" fill="white" />
          <ellipse cx="83" cy="68" rx="10" ry="11" fill="white" />
          <!-- Iris -->
          <circle cx="59" cy="69" r="7" fill="url(#irisGrad)" />
          <circle cx="85" cy="69" r="7" fill="url(#irisGrad)" />
          <!-- Pupil -->
          <circle cx="60" cy="70" r="4" fill="#1a0940" />
          <circle cx="86" cy="70" r="4" fill="#1a0940" />
          <!-- Eye shine -->
          <circle cx="62" cy="67" r="1.5" fill="white" opacity="0.9" />
          <circle cx="88" cy="67" r="1.5" fill="white" opacity="0.9" />
          <!-- Eyebrows -->
          <path d="M48 58 Q57 54 66 57" stroke="#4a2c0a" stroke-width="2.5" stroke-linecap="round" />
          <path d="M74 57 Q83 54 92 58" stroke="#4a2c0a" stroke-width="2.5" stroke-linecap="round" />
          <!-- Nose -->
          <path d="M70 74 Q67 83 64 86 Q70 89 76 86 Q73 83 70 74Z" fill="rgba(0,0,0,0.1)" />
          <!-- MOUTH (animatable) -->
          <g id="mouthGroup" transform="translate(70,102)">
            <!-- Lips -->
            <path d="M-13,0 Q-7,-5 0,-5 Q7,-5 13,0 Q7,5 0,5 Q-7,5 -13,0Z" fill="url(#lipsGrad)" id="mouthPath" />
            <!-- Teeth (shows when speaking) -->
            <rect x="-8" y="-3" width="16" height="5" rx="2.5" fill="white" id="teethRect" opacity="0" />
          </g>
          <!-- Cheek blush -->
          <ellipse cx="48" cy="82" rx="8" ry="5" fill="rgba(255,100,100,0.15)" />
          <ellipse cx="92" cy="82" rx="8" ry="5" fill="rgba(255,100,100,0.15)" />
          <!-- Shoulder decoration / lapels -->
          <path d="M45 112 Q55 108 62 115 L55 135 Q40 132 30 155 L30 130 Q34 118 45 112Z"
            fill="rgba(255,255,255,0.07)" />
          <!-- Glasses (optional chic touch) -->
          <rect x="47" y="62" width="20" height="15" rx="6" stroke="rgba(168,85,247,0.7)" stroke-width="1.5"
            fill="rgba(168,85,247,0.08)" />
          <rect x="73" y="62" width="20" height="15" rx="6" stroke="rgba(168,85,247,0.7)" stroke-width="1.5"
            fill="rgba(168,85,247,0.08)" />
          <line x1="67" y1="69" x2="73" y2="69" stroke="rgba(168,85,247,0.7)" stroke-width="1.5" />
          <line x1="47" y1="69" x2="42" y2="66" stroke="rgba(168,85,247,0.7)" stroke-width="1.5" />
          <line x1="93" y1="69" x2="98" y2="66" stroke="rgba(168,85,247,0.7)" stroke-width="1.5" />

          <!-- Gradients -->
          <defs>
            <radialGradient id="headGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#a855f7" />
              <stop offset="100%" stop-color="transparent" />
            </radialGradient>
            <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fddbb6" />
              <stop offset="100%" stop-color="#f5c28a" />
            </linearGradient>
            <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#7c4520" />
              <stop offset="100%" stop-color="#4a2c10" />
            </linearGradient>
            <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#3b1c6e" />
              <stop offset="100%" stop-color="#1a0933" />
            </linearGradient>
            <linearGradient id="tieGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#a855f7" />
              <stop offset="100%" stop-color="#7c3aed" />
            </linearGradient>
            <radialGradient id="irisGrad" cx="40%" cy="35%" r="60%">
              <stop offset="0%" stop-color="#60a5fa" />
              <stop offset="100%" stop-color="#1e3a8a" />
            </radialGradient>
            <linearGradient id="lipsGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e87070" />
              <stop offset="100%" stop-color="#c04040" />
            </linearGradient>
          </defs>
        </svg>
        <div class="soundwaves" id="soundwaves">
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
          <div class="wave-bar"></div>
        </div>
      </div>
    </div>

    <!-- Status -->
    <div
      style="display:flex;flex-direction:column;align-items:center;margin:12px 0 0;width:100%;max-width:440px;padding:0 20px;">
      <div class="status-pill" id="statusPill">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Ready to play</span>
      </div>
    </div>

    <!-- German text below character -->
    <div style="width:100%;max-width:440px;padding:0 20px;margin-top:16px;">
      <div class="lang-card german-card hidden-card" id="germanCard">
        <div class="lang-tag">🇩🇪 Deutsch</div>
        <div class="lang-text" id="germanText">—</div>
        <div class="speaking-indicator" id="speakIndicatorDe">
          <div class="speak-dot" style="background:var(--gold)"></div>
          <div class="speak-dot" style="background:var(--gold)"></div>
          <div class="speak-dot" style="background:var(--gold)"></div>
          <span>Speaking German…</span>
        </div>
      </div>
    </div>

    <div style="width:100%;max-width:440px;padding:0 20px;display:flex;flex-direction:column;align-items:center;">
      <button class="btn-replay" id="replayBtn" onclick="replay()">
        <svg viewBox="0 0 24 24">
          <path
            d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
        </svg>
        Replay Lesson
      </button>
    </div>

  </div><!-- /page2 -->

  <script>

  </script>
</body>

</html>
